<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音響ヒーリングゲーム：世界樹の開花 (大樹版)</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #1a1a2e;
            background-color: #020205;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 30px rgba(180, 200, 255, 0.05);
            border-radius: 8px;
        }
        #startBtn {
            padding: 14px 28px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            transition: all 0.3s;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(225, 190, 231, 0.7);
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや静かな音楽で、大樹に宝石の花を咲かせましょう（30秒）</div>
    <button id="startBtn">世界樹の声を聴く</button>
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let timeLeft = 30;
        let timerInterval;
        
        let bloomProgress = 0; // 0.0 〜 1.0 (1.0で満開)
        let maxBloomProgress = 1.3; 
        let flowers = [];
        let treeBranches = [];

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                timeLeft = 30;
                bloomProgress = 0;
                flowers = [];
                treeBranches = [];
                startBtn.style.display = 'none';

                // ⭐【大樹化】根元（幹）をぐっと低くし、そこから横へ大爆発させるための初期設定
                // 幹の長さを少し短め(65)にし、depthを10に増やしてより緻密に
                generateTree(canvas.width / 2, canvas.height - 35, -Math.PI / 2, 65, 10);

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        // ⭐【修正】横へ丸く広がるどっしりとした大樹を作るフラクタル
        function generateTree(x, y, angle, length, depth) {
            if (depth === 0) return;

            // 根元に近い枝ほど長く、横に伸びるように調整
            let x2 = x + Math.cos(angle) * length;
            let y2 = y + Math.sin(angle) * length;

            treeBranches.push({ x1: x, y1: y, x2: x2, y2: y2, depth: depth });

            // 先端の細い小枝（depthが5以下）にバランスよく花を散りばめる
            if (depth <= 5) { 
                let flowerCount = Math.floor((6 - depth) * 2); 
                for(let i=0; i<flowerCount; i++) {
                    let t = Math.random(); 
                    let fx = x + (x2 - x) * t;
                    let fy = y + (y2 - y) * t;
                    
                    const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                    
                    // ⭐【バグ修正】requiredProgressが0付近に偏らないよう、0.02〜0.98の間に完全分散
                    // これにより、10%のときは本当に10%の花しか咲かなくなります！
                    let required = 0.02 + Math.random() * 0.96;

                    flowers.push({
                        x: fx,
                        y: fy,
                        color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                        size: Math.random() * 3.5 + 3.5, // 密集したとき綺麗なようにほんの少し小ぶりに
                        requiredProgress: required, 
                        sparkleOffset: Math.random() * 100
                    });
                }
            }

            // 分岐の計算
            let numBranches = 2;
            // 最初の2〜3段階（主幹から太い大枝に別れる時）は、添付画像のように横に広く広げる
            let isMainBranch = (depth >= 8);

            for (let i = 0; i < numBranches; i++) {
                // 主幹に近い時はあえて「左右に大きく（最大65度近辺）」広げることで横長の大樹にする
                let angleSpread = isMainBranch ? 0.95 : 0.55; 
                let angleShift = (i === 0) ? -angleSpread : angleSpread;
                
                // ほんの少しランダムな揺らぎを混ぜて自然な枝振りに
                let newAngle = angle + angleShift + (Math.random() * 0.2 - 0.1);
                
                // 上に伸びる枝よりも、横に広がる枝の長さを維持する縮小率
                let shrinkFactor = isMainBranch ? 0.82 : 0.76;
                let newLength = length * shrinkFactor * (0.85 + Math.random() * 0.3);

                generateTree(x2, y2, newAngle, newLength, depth - 1);
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            let totalVolume = 0;
            for (let i = 0; i < dataArray.length; i++) {
                totalVolume += dataArray[i];
            }
            let avgVolume = totalVolume / dataArray.length;

            if (avgVolume > 15) {
                // 20秒で100%(1.0)に到達するなだらかなスピード
                bloomProgress += 0.00085; 
                if (bloomProgress > maxBloomProgress) bloomProgress = maxBloomProgress;
            }
        }

        function drawGame() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 世界樹の大樹としての幹と枝を描画（どっしりグレー）
            treeBranches.forEach(b => {
                ctx.save();
                ctx.strokeStyle = `rgba(130, 138, 150, ${0.15 + (b.depth * 0.08)})`;
                
                // ⭐【大樹化】根元の幹（depth=10, 9など）が圧倒的に太くなるように調整
                let thicknessMultiplier = 1.3;
                if(b.depth >= 8) thicknessMultiplier = 2.4; // 根元を劇的に太く
                ctx.lineWidth = b.depth * thicknessMultiplier; 
                
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(b.x1, b.y1);
                ctx.lineTo(b.x2, b.y2);
                ctx.stroke();
                ctx.restore();
            });

            // 2. 宝石の花を描画（開花パーセントと完全同期）
            let now = Date.now();
            flowers.forEach(f => {
                if (bloomProgress >= f.requiredProgress) {
                    ctx.save();
                    
                    let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                    ctx.globalAlpha = sparkle;
                    ctx.shadowBlur = 14;
                    ctx.shadowColor = f.color;
                    
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    
                    // 咲き始めの花は小さく、満開に近づくほどふっくら開く演出
                    let growth = Math.min(1.3, (bloomProgress - f.requiredProgress) * 5 + 0.3);
                    let currentSize = f.size * growth;
                    
                    ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2);
                    ctx.fill();

                    // 白い宝石の芯
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            });

            // UIテキスト
            let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '15px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
            
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

            // インジケーター
            ctx.fillStyle = 'rgba(144, 164, 174, 0.15)';
            ctx.textAlign = 'center';
            if (bloomProgress < 1.0 && !isGameOver) {
                ctx.fillText(".. 穏やかな声を感知中 ..", canvas.width/2, canvas.height - 15);
            }

            // リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(2, 2, 6, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#ffb7d5';
                ctx.font = 'bold 28px sans-serif';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffb7d5';
                ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度世界樹を育てる';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
