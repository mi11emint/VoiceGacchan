<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声リズムゲーム（超巨大＆限界発光花火版）</title>
    <style>
        body {
            margin: 0;
            background-color: #03030a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #223;
            background-color: #010105;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 25px rgba(0,255,255,0.08);
        }
        #info {
            font-size: 12px;
            color: #e0ffff;
            margin-bottom: 12px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div id="info">・・・保存待ち時間中・・・<br><br>
      音声リズムゲーム<br>
      声や音で下枠○を狙って！ 5コンボで画面を覆う大花火🎇^.ˬ.^</div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let audioContext;
        let analyser;
        let dataArray;
        let audioStream; 

        let isPlaying = false;
        let isGameOver = false;
        let isCountingDown = false; 
        let countdownNumber = 3;    

        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let timerInterval;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const spawnY = 80;
        const judgeLowY = canvas.height - 70;
        const targetRadius = 32;

        let notes = [];
        let nextSpawnCountdown = 0;
        let hitEffects = [];
        let fireworks = []; // ⭐ 超巨大花火用配列

        let lastVolume = 0;
        let inputCooldown = 0;

        // 🚀 画面が開いた瞬間に自動でマイク許可を取り、カウントダウンを開始する処理
        window.addEventListener('DOMContentLoaded', async () => {
            ctx.fillStyle = '#020206';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                startCountdown();

            } catch (err) {
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '14px sans-serif';
                ctx.fillText('マイクを許可、または接続してください', centerX, centerY);
                console.log('マイク起動エラー：', err);
            }
        });

        // ⏱️ カウントダウン処理
        function startCountdown() {
            isCountingDown = true;
            countdownNumber = 3;

            const cdInterval = setInterval(() => {
                countdownNumber--;
                if (countdownNumber < 0) {
                    clearInterval(cdInterval);
                    isCountingDown = false;
                    startGame(); 
                }
            }, 1000);

            function countdownLoop() {
                if (!isCountingDown) return;
                
                ctx.fillStyle = '#020206';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#101025';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(centerX, spawnY); ctx.lineTo(centerX, judgeLowY);
                ctx.stroke();

                ctx.strokeStyle = 'rgba(0, 150, 255, 0.2)'; 
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(centerX, judgeLowY, targetRadius, 0, Math.PI * 2); ctx.stroke();

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 70px sans-serif';
                
                if (countdownNumber > 0) {
                    ctx.fillStyle = '#00ffff';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00ffff';
                    ctx.fillText(countdownNumber, centerX, centerY);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#ffffff';
                    ctx.fillText('START!', centerX, centerY);
                }
                ctx.shadowBlur = 0; 

                requestAnimationFrame(countdownLoop);
            }
            countdownLoop();
        }

        // ゲーム本番開始
        function startGame() {
            isPlaying = true;
            isGameOver = false;
            score = 0;
            combo = 0;
            timeLeft = 30;
            notes = [];
            hitEffects = [];
            fireworks = [];
            nextSpawnCountdown = 20;

            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) endGame();
            }, 1000);

            gameLoop();
        }

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            updateGame();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            let maxVal = 0;
            for (let i = 0; i < dataArray.length; i++) {
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                }
            }

            let currentVolume = maxVal;
            const threshold = 30; 

            if (inputCooldown > 0) inputCooldown--;

            let volumeSpike = currentVolume - lastVolume;

            if (currentVolume > threshold && volumeSpike > 10 && inputCooldown === 0) {
                checkJudgment(); 
                inputCooldown = 10; 
            }

            lastVolume = currentVolume; 
        }

        function updateGame() {
            nextSpawnCountdown--;
            if (nextSpawnCountdown <= 0) {
                notes.push({
                    progress: 0, 
                    speed: 0.014 + Math.random() * 0.006
                });
                nextSpawnCountdown = Math.floor(Math.random() * 30) + 25;
            }

            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].progress += notes[i].speed;
                if (notes[i].progress > 1.15) {
                    notes.splice(i, 1);
                    combo = 0; 
                }
            }

            for (let i = hitEffects.length - 1; i >= 0; i--) {
                hitEffects[i].alpha -= 0.06;
                hitEffects[i].radius += 2.5;
                if (hitEffects[i].alpha <= 0) hitEffects.splice(i, 1);
            }

            // ⭐ 超巨大＆限界発光花火のアップデート処理
            for (let i = fireworks.length - 1; i >= 0; i--) {
                let fw = fireworks[i];
                fw.delay--;
                if (fw.delay <= 0) {
                    fw.state = "explode";
                    fw.alpha -= 0.012; // さらにゆっくりと余韻を残して消える
                    fw.radius += fw.expandSpeed; 
                    fw.expandSpeed *= 0.97; // 巨大さを出すため、減速率を低く（なかなか止まらない）
                }
                if (fw.alpha <= 0) fireworks.splice(i, 1);
            }
        }

        function checkJudgment() {
            let targetIndex = -1;
            let maxProgress = -1;

            for(let i=0; i<notes.length; i++) {
                if(notes[i].progress > maxProgress) {
                    maxProgress = notes[i].progress;
                    targetIndex = i;
                }
            }

            if (targetIndex === -1) return; 
            
            let note = notes[targetIndex];
            let diff = Math.abs(note.progress - 1.0);
            let currentY = spawnY + (judgeLowY - spawnY) * note.progress;

            let hitSuccess = false;

            if (diff < 0.10) {
                hitEffects.push({
                    x: centerX, y: currentY, radius: targetRadius,
                    color: "#ffffff", blur: 40, alpha: 1.0
                });
                score += 150;
                combo++;
                hitSuccess = true;
                notes.splice(targetIndex, 1);
            } else if (diff < 0.22) {
                hitEffects.push({
                    x: centerX, y: currentY, radius: targetRadius,
                    color: "#b0e0ff", blur: 18, alpha: 0.75
                });
                score += 50;
                combo++;
                hitSuccess = true;
                notes.splice(targetIndex, 1);
            }

            if (hitSuccess && combo >= 5) {
                triggerFireworkShow(); 
                combo = 0; 
            }
        }

        // ⭐ コンボMAXで画面を覆い尽くす超巨大・限界発光花火を生成
        function triggerFireworkShow() {
            // パステルカラーに、より発光が強い白とネオンブルーを追加
            const pastelColors = ["#ffffff", "#ffb7d5", "#b2ebf2", "#fff59d", "#e0ffff", "#e1bee7"];
            for (let i = 0; i < 6; i++) {
                // 画面全体に大きく広がるように配置
                let fireworkX = Math.random() * (canvas.width - 60) + 30;
                let fireworkY = Math.random() * 250 + 80; 

                fireworks.push({
                    x: fireworkX,
                    y: fireworkY,
                    radius: 3,
                    // ⭐【巨大化】これまでの2倍以上！画面からはみ出るレベル
                    maxRadius: Math.random() * 50 + 110, 
                    // ⭐【爆速】一瞬で画面を覆うスピード
                    expandSpeed: 8.0 + Math.random() * 4.0, 
                    color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                    alpha: 1.0, 
                    delay: i * 3, // ポポポンッとほぼ同時に咲く
                    state: "wait"
                });
            }
            score += 1000; 
        }

        function drawGame() {
            ctx.fillStyle = '#020206';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ⭐ 超巨大・限界発光花火（世界樹満開モード）の描画処理
            fireworks.forEach(fw => {
                if (fw.state === "explode") {
                    ctx.save();
                    // ⭐ フェードアウトを少し遅らせて、まばゆさを維持
                    ctx.globalAlpha = fw.alpha;
                    
                    // ⭐【限界発光】4層の光のオーラを重ねて、圧倒的なまばゆさを表現
                    
                    // 1層目（最外層）：巨大な淡いパステル光（世界樹の影）
                    ctx.shadowBlur = fw.radius * 3.5; 
                    ctx.shadowColor = fw.color;
                    ctx.strokeStyle = fw.color;
                    ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius, 0, Math.PI * 2); ctx.stroke();
                    
                    // 2層目：強いネオン光の輪
                    ctx.shadowBlur = fw.radius * 1.2;
                    ctx.shadowColor = "#ffffff";
                    ctx.strokeStyle = fw.color;
                    ctx.lineWidth = 15;
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 0.9, 0, Math.PI * 2); ctx.stroke();
                    
                    // 3層目：真っ白な芯の光の輪（世界樹の幹の光）
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = "#ffffff";
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = "#ffffff"; 
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 0.85, 0, Math.PI * 2); ctx.stroke();
                    
                    // 4層目（最内層）：画面を白く飛ばすほどの中心コア
                    ctx.fillStyle = "#ffffff";
                    ctx.shadowBlur = 50;
                    ctx.shadowColor = "#ffffff";
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 0.2, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.restore();
                }
            });

            ctx.strokeStyle = '#101025';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, spawnY); ctx.lineTo(centerX, judgeLowY);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(0, 150, 255, 0.45)';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(centerX, judgeLowY, targetRadius, 0, Math.PI * 2); ctx.stroke();

            hitEffects.forEach(fx => {
                ctx.save();
                ctx.globalAlpha = fx.alpha;
                ctx.shadowBlur = fx.blur;
                ctx.shadowColor = fx.color;
                ctx.fillStyle = fx.color;
                ctx.beginPath(); ctx.arc(fx.x, fx.y, fx.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            notes.forEach(note => {
                let currentY = spawnY + (judgeLowY - spawnY) * note.progress;
                let currentRadius = 3 + (15 * note.progress);

                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#0099ff";
                
                let gradient = ctx.createRadialGradient(centerX, currentY, 1, centerX, currentY, currentRadius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.6, '#f5f8ff');
                gradient.addColorStop(1, "#0088ff");
                ctx.fillStyle = gradient;

                ctx.beginPath(); ctx.arc(centerX, currentY, currentRadius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            let gaugeY = centerY - 20;
            ctx.save();
            ctx.strokeStyle = "#151525";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(centerX, gaugeY, 22, 0, Math.PI * 2);
            ctx.stroke();

            if (combo > 0) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#ffffff"; 
                ctx.strokeStyle = "#ffffff"; 
                ctx.lineWidth = 6;
                let progressAngle = (combo / 5) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(centerX, gaugeY, 22, -Math.PI / 2, (-Math.PI / 2) + progressAngle);
                ctx.stroke();
            }
            ctx.restore();

            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left'; ctx.fillText(`SCORE: ${score}`, 20, 40);
            ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 40);

            if (isGameOver) {
                ctx.fillStyle = 'rgba(1, 1, 5, 0.93)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('タイムアップ！', centerX, centerY - 30);
                ctx.fillStyle = '#00ffff';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText(`最終スコア: ${score}`, centerX, centerY + 20);
            }
        }

        // 🛑 ゲーム終了処理
        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            
            // ⭐【重要】マイクのストリームを完全にストップし、接続を強制終了します
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
            }
            if (audioContext) {
                audioContext.close();
            }
        }
    </script>
</body>
</html>
