<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界樹の開花 - Healing Tree</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 12px;
            text-align: center;
            padding: 0 20px;
        }
        #startBtn {
            padding: 16px 32px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            z-index: 100;
            margin-bottom: 15px;
        }
        .game-container {
            position: relative;
            width: 450px;
            height: 450px;
            max-width: 90vw;
            max-height: 60vh;
            background-color: #020205;
            border-radius: 8px;
            overflow: hidden;
        }
        #treeImg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.6; 
            z-index: 1;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや音楽で、大樹の中央に宝石を咲かせましょう（30秒）</div>
    <button id="startBtn">世界樹の声を聴く</button>

    <div class="game-container">
        <img id="treeImg" src="https://img1.mitemin.net/cn/c9/5h3rb7a49bj373z8gxyk7s3t40_k6d_vu_yx_5kna.png" alt="世界樹">
        <canvas id="gameCanvas" width="450" height="450"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext, analyser, dataArray, audioStream;
        let isPlaying = false, isGameOver = false;
        let timeLeft = 30, timerInterval, bloomProgress = 0, flowers = [];

        // 🔄 秒間60回の描画ループを最初から常時起動
        function animate() {
            drawGame();
            requestAnimationFrame(animate);
        }
        animate();

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;

            isPlaying = true;
            isGameOver = false;
            timeLeft = 30;
            bloomProgress = 0;

            // 🌸【花の配置】確実に画像の中央（225, 225）を中心にまあるく配置
            flowers = [];
            const totalFlowers = 350; 
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2; 

            for(let i = 0; i < totalFlowers; i++) {
                let angle = Math.random() * Math.PI * 2; 
                let dist = Math.pow(Math.random(), 0.8) * 140; 
                
                let fx = centerX + Math.cos(angle) * dist;
                let fy = centerY + Math.sin(angle) * dist;

                const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                let required = 0.01 + Math.random() * 0.98;

                flowers.push({
                    x: fx, y: fy,
                    color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                    maxSize: Math.random() * 3.5 + 2.5,
                    requiredProgress: required,
                    sparkleOffset: Math.random() * 100
                });
            }

            // タイマー開始
            timerInterval = setInterval(() => {
                timeLeft--;
                
                // 🛡️【安全装置】声が全く反応していなくても、1秒ごとに確実に約3.3%ずつ自動開花させる
                // これにより、マイクの不調があっても絶対に花が咲きます！
                if (bloomProgress < (30 - timeLeft) * 0.033) {
                    bloomProgress = (30 - timeLeft) * 0.033;
                }

                if (timeLeft <= 0) endGame();
            }, 1000);

            // マイクとオーディオの起動処理
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 🛡️ スマホのブラウザによる「音声ブロック」を強制解除する魔法の1行
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (err) {
                console.log('マイクなしモード（自動開花安全装置で動作します）');
            }
        });

        // マイクから音を拾って開花をスムーズに進める計算
        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let avg = total / dataArray.length;

            if (avg > 15) {
                // 声を感知しているときは、安全装置のスピードを追い抜いてグングン咲く
                bloomProgress += 0.0012; 
                if (bloomProgress > 1.1) bloomProgress = 1.1; 
            }
        }

        // 画面を描画する処理（背景画像の上に透明な膜として重なっています）
        function drawGame() {
            if (isPlaying) {
                updateAudio();
            }

            // キャンバスを透明にクリア（下の世界樹画像が見えるように）
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isPlaying) {
                // 宝石の花を上から重ねて描画
                let now = Date.now();
                flowers.forEach(f => {
                    if (bloomProgress >= f.requiredProgress) {
                        ctx.save();
                        let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                        ctx.globalAlpha = sparkle;
                        
                        let timeSinceBloom = bloomProgress - f.requiredProgress;
                        let sizeGrowth = Math.min(1.0, timeSinceBloom * 4 + 0.15); 
                        let currentSize = f.maxSize * sizeGrowth;

                        ctx.shadowBlur = currentSize * 2.2;
                        ctx.shadowColor = f.color;
                        ctx.fillStyle = f.color;
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2); ctx.fill();

                        ctx.shadowBlur = 0;
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    }
                });

                // 開花度と残り時間の表示
                let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
                ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left';
                ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 20, 35);
                ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 35);

                // 30秒終了時の暗転リザルト表示
                if (isGameOver) {
                    ctx.fillStyle = 'rgba(2, 2, 6, 0.95)'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '20px sans-serif';
                    ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 25);
                    ctx.fillStyle = '#e1bee7'; ctx.font = 'bold 24px sans-serif';
                    ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 25);
                }
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            
            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            
            setTimeout(() => {
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
