<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界樹の開花 - Healing Tree (自動開始版)</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #info {
            font-size: 13px;
            color: #ccdacd;
            margin-bottom: 12px;
            text-align: center;
            padding: 0 20px;
        }
        .game-container {
            position: relative;
            width: 450px;
            height: 450px;
            max-width: 90vw;
            max-height: 60vh;
            background-color: #020205;
            border-radius: 8px;
            overflow: hidden;
        }
        #treeImg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.6; 
            z-index: 1;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">・・・保存待ち時間中・・・<br><br>穏やかな語りかけ・音楽で<br>
    宝石を咲かせましょう</div>
    <div class="game-container">
        <img id="treeImg" src="https://img1.mitemin.net/cn/c9/5h3rb7a49bj373z8gxyk7s3t40_k6d_vu_yx_5kna.png" alt="世界樹">
        <canvas id="gameCanvas" width="450" height="450"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let audioContext, analyser, dataArray, audioStream;
        let isPlaying = false, isGameOver = false;
        let isCountingDown = false; // ⭐ カウントダウンフラグ
        let countdownNumber = 3;    // ⭐ カウントダウン初期値
        let timeLeft = 30, timerInterval, bloomProgress = 0, flowers = [];

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2; 

        // 🔄 アニメーションメインループ
        function animate() {
            drawGame();
            requestAnimationFrame(animate);
        }
        animate();

        // 🚀 【新規】画面読み込み時にマイクを取得し、そのまま自動開始
        window.addEventListener('DOMContentLoaded', async () => {
            // お花のデータ定義（配列化）
            flowers = [];
            const totalFlowers = 350; 

            for(let i = 0; i < totalFlowers; i++) {
                let angle = Math.random() * Math.PI * 2; 
                let dist = Math.pow(Math.random(), 0.8) * 140; 
                
                let fx = centerX + Math.cos(angle) * dist;
                let fy = centerY + Math.sin(angle) * dist;

                const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                let required = 0.01 + Math.random() * 0.98;

                flowers.push({
                    x: fx, y: fy,
                    color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                    maxSize: Math.random() * 3.5 + 2.5,
                    requiredProgress: required,
                    sparkleOffset: Math.random() * 100
                });
            }

            try {
                // ページ表示と同時にマイク許可ポップアップ
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // カウントダウンフェーズへ移行
                startCountdown();
            } catch (err) {
                console.log('マイクなしモードでの起動');
                startCountdown(); // 許可が得られなくても進行
            }
        });

        // ⏱️ カウントダウンのインターバル処理
        function startCountdown() {
            isCountingDown = true;
            countdownNumber = 3;

            const cdInterval = setInterval(() => {
                countdownNumber--;
                if (countdownNumber < 0) {
                    clearInterval(cdInterval);
                    isCountingDown = false;
                    startGame(); // 3秒後にゲーム本番開始
                }
            }, 1000);
        }

        // ゲーム本番開始
        function startGame() {
            isPlaying = true;
            isGameOver = false;
            timeLeft = 30;
            bloomProgress = 0;

            timerInterval = setInterval(() => {
                timeLeft--;
                
                // 何もしなくても30秒で30%になるよう、1秒につき「0.01（1%）」自動開花
                if (bloomProgress < (30 - timeLeft) * 0.01) {
                    bloomProgress = (30 - timeLeft) * 0.01;
                }

                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let avg = total / dataArray.length;

            if (avg > 15) {
                // 声をかけているときは、少し多めにお花が咲き進む
                bloomProgress += 0.0015; 
                if (bloomProgress > 1.1) bloomProgress = 1.1; 
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. カウントダウン中の描画処理
            if (isCountingDown) {
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 75px sans-serif';

                if (countdownNumber > 0) {
                    ctx.fillStyle = '#e1bee7';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#e1bee7';
                    ctx.fillText(countdownNumber, centerX, centerY);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#ffffff';
                    ctx.fillText('START!', centerX, centerY);
                }
                ctx.restore();
                return; // カウントダウン中はここで描画を抜ける
            }

            // 2. ゲーム本番中の描画処理
            if (isPlaying) {
                updateAudio();

                let now = Date.now();
                flowers.forEach(f => {
                    if (bloomProgress >= f.requiredProgress) {
                        ctx.save();
                        let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                        ctx.globalAlpha = sparkle;
                        
                        let timeSinceBloom = bloomProgress - f.requiredProgress;
                        let sizeGrowth = Math.min(1.0, timeSinceBloom * 4 + 0.15); 
                        let currentSize = f.maxSize * sizeGrowth;

                        ctx.shadowBlur = currentSize * 2.2;
                        ctx.shadowColor = f.color;
                        ctx.fillStyle = f.color;
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2); ctx.fill();

                        ctx.shadowBlur = 0;
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    }
                });

                let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
                ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left';
                ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 20, 35);
                ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 35);

                // 3. タイムアップ後のリザルト画面表示
                if (isGameOver) {
                    ctx.fillStyle = 'rgba(2, 2, 6, 0.95)'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '20px sans-serif';
                    ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 25);
                    ctx.fillStyle = '#e1bee7'; ctx.font = 'bold 24px sans-serif';
                    ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 25);
                }
            }
        }

        // 🛑 ゲーム終了処理
        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            
            // 🛡️ マイクのストリーム情報を完全クリア（スマホの録音表示を強制停止）
            if (audioStream) {
                audioStream.getTracks().forEach(t => t.stop());
            }
            if (audioContext) {
                audioContext.close();
            }
            
            setTimeout(() => {
                // アプリ側でリロードされる想定のためフラグのみ戻す
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
