<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声インベーダー（移動ボタン付き）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* ボタン連打時の誤選択防止 */
        }
        #gameCanvas {
            border: 2px solid #555;
            background-color: #000;
            max-width: 100%;
            max-height: 60vh;
        }
        #startBtn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #0fa;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #info {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
        /* 🕹 左右移動ボタンのスタイル */
        .controls {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .btn-move {
            width: 45%;
            height: 60px;
            font-size: 24px;
            font-weight: bold;
            background-color: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation; /* スマホでの連打ズームを防止 */
        }
        .btn-move:active {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div id="info">【声で撃て！】下のボタンで左右に動けます ◀ ▶</div>
    <button id="startBtn">ゲームスタート</button>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="controls">
        <button id="leftBtn" class="btn-move">◀</button>
        <button id="rightBtn" class="btn-move">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        // ゲーム状態
        let score = 0;
        let timeLeft = 30; // 30秒の制限時間
        let timerInterval;

        // オブジェクト管理
        let bullets = [];
        let invaders = [];
        let player = { x: canvas.width / 2, y: canvas.height - 40, speed: 5 };

        // ボタンの入力状態フラグ
        let moveLeft = false;
        let moveRight = false;

        // 音声用
        let voiceDuration = 0;
        let isBeaming = false;
        let invaderSpawnTimer = 0;

        // 🕹 左右ボタンのイベント設定（スマホのタッチとPCのクリック両対応）
        const setBtnEvent = (btn, startFlag, endFlag) => {
            btn.addEventListener('mousedown', () => { if(isPlaying) startFlag() });
            btn.addEventListener('mouseup', () => { endFlag() });
            btn.addEventListener('mouseleave', () => { endFlag() });
            
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); if(isPlaying) startFlag() });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); endFlag() });
        };

        setBtnEvent(leftBtn, () => moveLeft = true, () => moveLeft = false);
        setBtnEvent(rightBtn, () => moveRight = true, () => moveRight = false);

        // PCのキーボード（← / →）でも動かせるようにオマケ機能
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft = true;
            if (e.key === 'ArrowRight') moveRight = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') moveLeft = false;
            if (e.key === 'ArrowRight') moveRight = false;
        });

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                score = 0;
                timeLeft = 30;
                bullets = [];
                invaders = [];
                startBtn.style.display = 'none';

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;

            updateAudio();
            updateGame();
            checkCollisions();
            drawGame();

            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let volume = total / dataArray.length;

            const threshold = 15; // 高感度

            if (volume > threshold) {
                voiceDuration++;
                if (voiceDuration > 15) isBeaming = true;

                if (isBeaming) {
                    bullets.push({
                        x: player.x,
                        y: player.y - 10,
                        width: Math.min(volume * 0.5, 40),
                        height: 25,
                        speed: 12,
                        color: '#f0f',
                        isBeam: true
                    });
                } else {
                    if (voiceDuration % 5 === 1) {
                        bullets.push({
                            x: player.x,
                            y: player.y - 10,
                            radius: Math.min(volume * 0.4, 30),
                            speed: 7,
                            color: '#0fa',
                            isBeam: false
                        });
                    }
                }
            } else {
                voiceDuration = 0;
                isBeaming = false;
            }
        }

        function updateGame() {
            // 自機の移動処理
            if (moveLeft) player.x -= player.speed;
            if (moveRight) player.x += player.speed;

            // 画面外に飛び出さないようにストッパー
            if (player.x < 20) player.x = 20;
            if (player.x > canvas.width - 20) player.x = canvas.width - 20;

            // 弾の移動
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -50) bullets.splice(i, 1);
            }

            // インベーダーの出現
            invaderSpawnTimer++;
            if (invaderSpawnTimer > 40) {
                invaders.push({
                    x: Math.random() * (canvas.width - 50) + 25,
                    y: -20,
                    size: 22,
                    speed: 1.2 + Math.random() * 1.5
                });
                invaderSpawnTimer = 0;
            }

            // インベーダーの移動
            for (let i = invaders.length - 1; i >= 0; i--) {
                invaders[i].y += invaders[i].speed;

                // ⭐ 修正：一番下まで来たら、ゲーム終了せずに消滅させるだけにする
                if (invaders[i].y > canvas.height + 20) {
                    invaders.splice(i, 1);
                }
            }
        }

        function checkCollisions() {
            for (let b = bullets.length - 1; b >= 0; b--) {
                for (let i = invaders.length - 1; i >= 0; i--) {
                    let bullet = bullets[b];
                    let invader = invaders[i];
                    if (!bullet || !invader) continue;

                    let hit = false;
                    if (bullet.isBeam) {
                        let closeX = Math.max(bullet.x - bullet.width/2, Math.min(invader.x, bullet.x + bullet.width/2));
                        let closeY = Math.max(bullet.y, Math.min(invader.y, bullet.y + bullet.height));
                        let distanceX = invader.x - closeX;
                        let distanceY = invader.y - closeY;
                        if ((distanceX * distanceX + distanceY * distanceY) < (invader.size * invader.size)) hit = true;
                    } else {
                        let dx = bullet.x - invader.x;
                        let dy = bullet.y - invader.y;
                        if (Math.sqrt(dx * dx + dy * dy) < (bullet.radius + invader.size)) hit = true;
                    }

                    if (hit) {
                        invaders.splice(i, 1);
                        score += 100;
                        if (!bullet.isBeam) {
                            bullets.splice(b, 1);
                            break;
                        }
                    }
                }
            }
        }

        function drawGame() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 自機
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 20, player.y, 40, 15);
            ctx.fillRect(player.x - 5, player.y - 8, 10, 8);

            // 弾
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                if (!bullet.isBeam) {
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                }
            });

            // インベーダー
            invaders.forEach(invader => {
                ctx.font = `${invader.size * 1.3}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👾', invader.x, invader.y);
            });

            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 15, 30);
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 15, 30);

            // リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('ゲーム終了！', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#0fa';
                ctx.font = '22px sans-serif';
                ctx.fillText(`最終スコア: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            
            setTimeout(() => {
                startBtn.textContent = 'もう一度遊ぶ';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2000);
        }
    </script>
</body>
</html>
