<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボイスインベーダー (マイク切断版)</title>
    <style>
        body { margin: 0; background-color: #111; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        canvas { background-color: #000; display: block; margin: 10px auto; border: 2px solid #333; max-width: 100%; max-height: 70vh; }
        #startBtn { padding: 12px 24px; font-size: 18px; font-weight: bold; background-color: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <button id="startBtn">ゲームスタート（マイクを使用します）</button>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext, analyser, dataArray, audioStream; // ⭐ audioStreamを追加
        let isPlaying = false, isGameOver = false;
        let timeLeft = 30, score = 0, timerInterval;

        let player = { x: 180, y: 440, w: 40, h: 20, speed: 6 };
        let bullets = [], invaders = [];
        let moveDirection = 0; 

        // タッチ操作用（左右に動かす）
        window.addEventListener('touchstart', (e) => {
            const touchX = e.touches[0].clientX;
            moveDirection = (touchX < window.innerWidth / 2) ? -1 : 1;
        });
        window.addEventListener('touchend', () => { moveDirection = 0; });

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                // ⭐ ストリームを記憶
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // 初期化
                isPlaying = true; isGameOver = false; timeLeft = 30; score = 0;
                bullets = []; invaders = []; player.x = 180;
                startBtn.style.display = 'none';

                spawnInvaders();
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) { alert('マイクの許可が必要です：' + err); }
        });

        function spawnInvaders() {
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    invaders.push({ x: col * 55 + 40, y: row * 35 + 60, w: 35, h: 20, alive: true });
                }
            }
        }

        let lastShotTime = 0;
        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let volume = total / dataArray.length;

            // 声の大きさが基準を超えたら弾を発射（連射制限：0.15秒）
            let now = Date.now();
            if (volume > 35 && now - lastShotTime > 150) {
                bullets.push({ x: player.x + player.w / 2 - 3, y: player.y, w: 6, h: 12, speed: 7 });
                lastShotTime = now;
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            updateGame();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateGame() {
            player.x += moveDirection * player.speed;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

            bullets.forEach((b, bi) => {
                b.y -= b.speed;
                if (b.y < 0) bullets.splice(bi, 1);
            });

            let allDead = true;
            invaders.forEach(inv => {
                if (!inv.alive) return;
                allDead = false;
                
                // インベーダーがじわじわ迫る
                inv.y += 0.2;
                if (inv.y + inv.h >= player.y) isGameOver = true;

                // 弾との当たり判定
                bullets.forEach((b, bi) => {
                    if (b.x < inv.x + inv.w && b.x + b.w > inv.x && b.y < inv.y + inv.h && b.y + b.h > inv.y) {
                        inv.alive = false;
                        bullets.splice(bi, 1);
                        score += 10;
                    }
                });
            });

            if (allDead) spawnInvaders(); // 全滅したら次ウエーブ
            if (isGameOver) endGame();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // プレイヤー
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // 弾
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // インベーダー
            ctx.fillStyle = '#ff4757';
            invaders.forEach(inv => {
                if (inv.alive) ctx.fillRect(inv.x, inv.y, inv.w, inv.h);
            });

            // UI
            ctx.fillStyle = 'white'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 35);
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 35);

            if (isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4757'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(timeLeft <= 0 ? 'TIME UP!' : 'GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.fillStyle = 'white'; ctx.font = '20px sans-serif';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        // 🛑【マイク切断】ゲーム終了処理
        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);

            // ⭐ マイクストリームを完全に停止
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
            }
            if (audioContext) {
                audioContext.close();
            }

            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度あそぶ';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2000);
        }
    </script>
</body>
</html>
