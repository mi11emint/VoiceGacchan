<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界樹の開花 - Healing Tree</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 12px;
            text-align: center;
            padding: 0 20px;
        }
        #startBtn {
            padding: 16px 32px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            z-index: 100;
            margin-bottom: 15px;
        }
        /* 🌳 画像とキャンバスをぴったり重ねるためのコンテナ */
        .game-container {
            position: relative;
            width: 450px;
            height: 450px;
            max-width: 95vw;
            max-height: 60vh;
        }
        /* 背景の大樹画像（HTMLで確実に表示） */
        #treeImg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.6; /* 花が見えやすいように少しだけ薄くします */
            z-index: 1;
        }
        /* 花を描く透明なキャンバス */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* キャンバス越しでも下の操作を邪魔しない */
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや音楽で、大樹の中央に宝石を咲かせましょう（30秒）</div>
    <button id="startBtn">世界樹の声を聴く</button>

    <div class="game-container">
        <img id="treeImg" src="https://img1.mitemin.net/g3/mj/2txw8fapepkqd1o8fs86c53z4c_9vl_18g_18g_3cih.png" alt="世界樹">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext, analyser, dataArray, audioStream;
        let isPlaying = false, isGameOver = false;
        let timeLeft = 30, timerInterval, bloomProgress = 0, flowers = [];

        // 🔄 常に画面を秒間60回描き直すループ（これで花がアニメーションします）
        function animate() {
            drawGame();
            requestAnimationFrame(animate);
        }
        animate();

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;

            // ボタンは消さずに、ゲーム状態だけをリセットしてスタート
            isPlaying = true;
            isGameOver = false;
            timeLeft = 30;
            bloomProgress = 0;

            // ⭐【花の配置】画像の中央付近（250, 230）から丸く円状に広がるように生成
            flowers = [];
            const totalFlowers = 300; 
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 - 20; 

            for(let i = 0; i < totalFlowers; i++) {
                let angle = Math.random() * Math.PI * 2; // 360度全方位
                let dist = Math.pow(Math.random(), 0.85) * 140; // 綺麗な丸い形に密集
                
                let fx = centerX + Math.cos(angle) * dist;
                let fy = centerY + Math.sin(angle) * dist;

                const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                let required = 0.01 + Math.random() * 0.98;

                flowers.push({
                    x: fx, y: fy,
                    color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                    maxSize: Math.random() * 3.5 + 2.5,
                    requiredProgress: required,
                    sparkleOffset: Math.random() * 100
                });
            }

            // タイマー開始
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) endGame();
            }, 1000);

            // マイクの起動
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (err) {
                console.log('マイクなしモードで実行します');
            }
        });

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let avg = total / dataArray.length;

            if (avg > 15) {
                bloomProgress += 0.00085; 
                if (bloomProgress > 1.1) bloomProgress = 1.1; 
            }
        }

        function drawGame() {
            if (isPlaying) {
                updateAudio();
            }

            // キャンバスをクリア（透明にするため、背景色は塗らずに透明に消去します）
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ゲーム中の場合、またはゲームオーバー画面の場合のみ描画
            if (isPlaying) {
                // 宝石の花の描画
                let now = Date.now();
                flowers.forEach(f => {
                    if (bloomProgress >= f.requiredProgress) {
                        ctx.save();
                        let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                        ctx.globalAlpha = sparkle;
                        
                        let timeSinceBloom = bloomProgress - f.requiredProgress;
                        let sizeGrowth = Math.min(1.0, timeSinceBloom * 4 + 0.15); 
                        let currentSize = f.maxSize * sizeGrowth;

                        ctx.shadowBlur = currentSize * 2.2;
                        ctx.shadowColor = f.color;
                        ctx.fillStyle = f.color;
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2); ctx.fill();

                        ctx.shadowBlur = 0;
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    }
                });

                // UI表示
                let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
                ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left';
                ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
                ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

                // 30秒終了時のリザルト画面表示
                if (isGameOver) {
                    ctx.fillStyle = 'rgba(2, 2, 6, 0.95)'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '22px sans-serif';
                    ctx.fillText('時の砂が尽きました', 250, 210);
                    ctx.fillStyle = '#e1bee7'; ctx.font = 'bold 26px sans-serif';
                    ctx.fillText(`最終開花度: ${displayPercent}%`, 250, 260);
                }
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            
            // マイクを確実に切断してオフにする
            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            
            setTimeout(() => {
                isPlaying = false;
                // 次にまた遊べるように状態を戻す
            }, 2500);
        }
    </script>
</body>
</html>
