<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音響ヒーリングゲーム：世界樹の開花 (完成版)</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #1a1a2e;
            background-color: #020205;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 30px rgba(180, 200, 255, 0.05);
            border-radius: 8px;
        }
        #startBtn {
            padding: 14px 28px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            transition: all 0.3s;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(225, 190, 231, 0.7);
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや静かな音楽で、大樹に宝石の花を咲かせましょう（30秒）</div>
    <button id="startBtn">世界樹の声を聴く</button>
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        // 🌳【修正】教えていただいた大樹のURLを直接セットしました！
        const TREE_IMAGE_URL = 'https://img1.mitemin.net/g3/mj/2txw8fapepkqd1o8fs86c53z4c_9vl_18g_18g_3cih.png'; 

        const treeImg = new Image();
        treeImg.crossOrigin = "anonymous"; // ネット上の画像をCanvasで安全に扱うための設定
        treeImg.src = TREE_IMAGE_URL;

        let audioContext;
        let analyser;
        let dataArray;
        let audioStream; 
        let isPlaying = false;
        let isGameOver = false;

        let timeLeft = 30;
        let timerInterval;
        
        let bloomProgress = 0; 
        let flowers = [];

        let imgLoaded = false;
        treeImg.onload = () => { imgLoaded = true; };

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                timeLeft = 30;
                bloomProgress = 0;
                
                // 花の配置
                flowers = [];
                const totalFlowers = 350; 
                
                for(let i = 0; i < totalFlowers; i++) {
                    // 画像の大樹の「枝が生い茂るドーム状のエリア」に綺麗に散りばめる
                    let angle = Math.PI + Math.random() * Math.PI; 
                    let radius = Math.random() * 160; 
                    
                    let fx = (canvas.width / 2) + Math.cos(angle) * radius * 1.15; 
                    let fy = (canvas.height / 2 - 20) + Math.sin(angle) * radius * 0.95;

                    const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                    let required = 0.01 + Math.random() * 0.99;

                    flowers.push({
                        x: fx,
                        y: fy,
                        color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                        maxSize: Math.random() * 3.5 + 3, 
                        requiredProgress: required,
                        sparkleOffset: Math.random() * 100
                    });
                }

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            let totalVolume = 0;
            for (let i = 0; i < dataArray.length; i++) {
                totalVolume += dataArray[i];
            }
            let avgVolume = totalVolume / dataArray.length;

            if (avgVolume > 15) {
                bloomProgress += 0.00085; 
                if (bloomProgress > 1.2) bloomProgress = 1.2; 
            }
        }

        function drawGame() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. お気に入りの大樹を描画
            ctx.save();
            if (imgLoaded) {
                ctx.globalAlpha = 0.5; // 宝石の光が目立つように、木の存在感を上品な濃さに
                ctx.drawImage(treeImg, 40, 80, 420, 390);
            } else {
                ctx.strokeStyle = '#333b45';
                ctx.lineWidth = 15;
                ctx.beginPath(); ctx.moveTo(250, 470); ctx.lineTo(250, 250); ctx.stroke();
            }
            ctx.restore();

            // 2. 宝石の花を描画
            let now = Date.now();
            flowers.forEach(f => {
                if (bloomProgress >= f.requiredProgress) {
                    ctx.save();
                    
                    let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                    ctx.globalAlpha = sparkle;
                    
                    let timeSinceBloom = bloomProgress - f.requiredProgress;
                    let sizeGrowth = Math.min(1.0, timeSinceBloom * 5 + 0.2); 
                    let currentSize = f.maxSize * sizeGrowth;

                    ctx.shadowBlur = currentSize * 2.2;
                    ctx.shadowColor = f.color;
                    
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            });

            // UIテキスト
            let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '15px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
            
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

            // インジケーター
            ctx.fillStyle = 'rgba(144, 164, 174, 0.15)';
            ctx.textAlign = 'center';
            if (bloomProgress < 1.0 && !isGameOver) {
                ctx.fillText(".. 穏やかな声を感知中 ..", canvas.width/2, canvas.height - 15);
            }

            // リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(2, 2, 6, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#ffb7d5';
                ctx.font = 'bold 28px sans-serif';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffb7d5';
                ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);

            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
            }
            if (audioContext) {
                audioContext.close();
            }

            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度世界樹を育てる';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
